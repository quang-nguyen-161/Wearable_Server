upstream nextjs       { server next-app:3000; }
upstream thingsboard  { server thingsboard:9090; }

server {
    listen 80;

    # ThingsBoard WebSocket — must come before generic /api/
    location /api/ws/ {
        proxy_pass         http://thingsboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ThingsBoard REST API (browser-side calls via NEXT_PUBLIC_TB_BASE_URL)
    location /tb/ {
        rewrite            ^/tb/(.*)$ /$1 break;
        proxy_pass         http://thingsboard;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }

    # Next.js app
    location / {
        proxy_pass         http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade          $http_upgrade;
        proxy_set_header   Connection       "upgrade";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    }
}
